version: 2

updates:
  # ─────────────────────────────
  # GitHub Actions dependencies
  # ─────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"

  # ──────────────────
